[package]
name = "arrow-kafka-pyo3"
version = "0.1.0"
edition = "2024"

[lib]
name = "arrow_kafka_pyo3"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.28.2", features = ["extension-module"] }
arrow = { version = "58.0.0", features = ["ffi", "pyarrow"] }
arrow-kafka = { path = "../arrow-kafka" }
anyhow = { workspace = true }
